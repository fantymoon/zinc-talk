server:
  port: 3800

spring:
  application:
    name: zinc-talk
  datasource:
    url: jdbc:mysql://localhost:3306/zinc_talk?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
  servlet:
    multipart:
      enabled: true
      max-file-size: 50MB     
      max-request-size: 50MB   

#文件上传存储目录
app:
  upload-dir: ./uploads

jwt:
  secret: zinc-talk-secret-key-2026-must-be-at-least-256-bits-long
  expiration: 86400000

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: isDeleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  mapper-locations: classpath*:/mapper/**/*.xml
